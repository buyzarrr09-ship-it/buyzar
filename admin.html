<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BUYZAR Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f4f4f4;color:#111}
h1,h2,h3,.logo{font-family:'Poppins',sans-serif}

#loginPage{position:fixed;inset:0;background:#111;display:flex;align-items:center;justify-content:center;z-index:999}
.lbox{background:#fff;border-radius:16px;padding:32px;width:90%;max-width:360px}
.llogo{font-size:22px;font-weight:800;color:#FF4C1C;margin-bottom:4px}.llogo span{color:#111}
.lsub{font-size:12px;color:#888;margin-bottom:20px}
.f{margin-bottom:12px}
.f label{display:block;font-size:12px;font-weight:600;margin-bottom:4px}
.f input,.f select,.f textarea{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;outline:none}
.f input:focus,.f select:focus{border-color:#FF4C1C}
.f textarea{min-height:60px;resize:vertical}
.btn{border:none;cursor:pointer;font-weight:700;border-radius:8px;font-family:'Poppins',sans-serif}
.btn-main{background:#FF4C1C;color:#fff;padding:11px;font-size:13px;width:100%}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-blue{background:#2563EB;color:#fff}
.btn-red{background:#DC2626;color:#fff}
.btn-green{background:#16A34A;color:#fff}
.btn-grey{background:#fff;border:1.5px solid #ddd;color:#111}
#adminPage{display:none}
#sb{position:fixed;left:0;top:0;width:210px;height:100vh;background:#111;z-index:50;display:flex;flex-direction:column;transition:transform .3s}
.sb-logo{padding:16px;border-bottom:1px solid #222}
.sb-logo .logo{font-size:18px;font-weight:800;color:#FF4C1C}.sb-logo .logo span{color:#fff}
.sb-logo p{font-size:10px;color:#555;margin-top:2px}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-sec{font-size:9px;font-weight:700;color:#444;letter-spacing:1.5px;padding:10px 14px 3px;text-transform:uppercase}
.sb-a{display:block;padding:9px 14px;color:#aaa;font-size:12px;cursor:pointer;border-left:3px solid transparent;transition:all .2s}
.sb-a:hover{color:#fff;background:rgba(255,255,255,.05)}
.sb-a.act{color:#fff;background:rgba(255,76,28,.15);border-left-color:#FF4C1C}
.sb-foot{padding:12px 14px;border-top:1px solid #222}
.sb-foot button{background:none;border:none;color:#666;cursor:pointer;font-size:12px}
.sb-foot button:hover{color:#fff}
#content{margin-left:210px;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #eee;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:16px;font-weight:700}
.av{width:30px;height:30px;border-radius:50%;background:#FF4C1C;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
#pg{padding:18px 20px}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.sc{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 5px rgba(0,0,0,.06);display:flex;align-items:center;gap:10px}
.si{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.sn{font-size:18px;font-weight:800;font-family:'Poppins',sans-serif}
.sl{font-size:10px;color:#888}
.card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 5px rgba(0,0,0,.06);margin-bottom:14px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ct{font-size:14px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 9px;color:#888;font-size:10px;text-transform:uppercase;border-bottom:1.5px solid #eee;background:#f9f9f9}
td{padding:9px 9px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:last-child td{border-bottom:none}
.bx{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.bx-or{background:#FFF0EB;color:#C93A0F}
.bx-gr{background:#DCFCE7;color:#166534}
.bx-re{background:#FEE2E2;color:#991B1B}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:12px}
.ov.show{display:flex}
.md{background:#fff;border-radius:12px;padding:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.md h2{font-size:15px;font-weight:700;margin-bottom:14px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.tw{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600}
.tg{position:relative;width:36px;height:20px}
.tg input{opacity:0;width:0;height:0}
.ts{position:absolute;inset:0;background:#ccc;border-radius:20px;cursor:pointer;transition:.3s}
.ts:before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.tg input:checked+.ts{background:#FF4C1C}
.tg input:checked+.ts:before{transform:translateX(16px)}
.ipv{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.ipv img{width:54px;height:54px;border-radius:6px;object-fit:cover;border:2px solid #FF4C1C}
#sbov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}
.mbtn{display:none;background:none;border:none;cursor:pointer;padding:4px}
@media(max-width:680px){
  #sb{transform:translateX(-100%)}
  #sb.open{transform:none}
  #content{margin-left:0}
  .mbtn{display:block}
  .fr{grid-template-columns:1fr}
  .sg{grid-template-columns:1fr 1fr}
}
#toast{position:fixed;bottom:18px;right:18px;background:#111;color:#fff;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s}
#toast.show{opacity:1}
</style>
</head>
<body>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="lbox">
    <div class="llogo">BUY<span>ZAR</span></div>
    <div class="lsub">Admin Panel</div>
    <div class="f"><label>Email / Mobile</label><input id="le" type="text" value="9939141695"/></div>
    <div class="f"><label>Password</label><input id="lp" type="password" placeholder="Password"/></div>
    <p id="lerr" style="color:#DC2626;font-size:11px;margin-bottom:8px;display:none">❌ Wrong credentials!</p>
    <button class="btn btn-main" id="loginBtn">Login to Admin</button>
  </div>
</div>

<!-- ADMIN PAGE -->
<div id="adminPage">
  <div id="sbov" onclick="closeSB()"></div>
  <div id="sb">
    <div class="sb-logo"><div class="logo">BUY<span>ZAR</span></div><p>Admin Panel</p></div>
    <div class="sb-nav">
      <div class="sb-sec">Main</div>
      <div class="sb-a act" data-page="dashboard">📊 Dashboard</div>
      <div class="sb-a" data-page="orders">📦 Orders</div>
      <div class="sb-sec">Catalogue</div>
      <div class="sb-a" data-page="products">🏪 Products</div>
      <div class="sb-a" data-page="categories">🗂️ Categories</div>
      <div class="sb-sec">People</div>
      <div class="sb-a" data-page="users">👥 Users</div>
      <div class="sb-a" data-page="delivery">🛵 Delivery Boys</div>
      <div class="sb-sec">Settings</div>
      <div class="sb-a" data-page="payments">💳 Payments</div>
      <div class="sb-a" data-page="dsettings">⚙️ Delivery Settings</div>
      <div class="sb-a" data-page="analytics">📈 Analytics</div>
    </div>
    <div class="sb-foot"><button onclick="location.reload()">🚪 Logout</button></div>
  </div>
  <div id="content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="mbtn" onclick="toggleSB()">☰</button>
        <h1 id="ptitle">Dashboard</h1>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;color:#888">Admin</span>
        <div class="av">A</div>
      </div>
    </div>
    <div id="pg"><div style="text-align:center;padding:40px;color:#888">Loading...</div></div>
  </div>
</div>
<!-- PRODUCT MODAL -->
<div class="ov" id="pModal">
  <div class="md">
    <h2 id="pModalTitle">Add Product</h2>
    <input type="hidden" id="pId"/>
    <div class="fr">
      <div class="f"><label>Name *</label><input type="text" id="pName" placeholder="e.g. Fresh Tomatoes"/></div>
      <div class="f"><label>Category *</label>
        <select id="pCat">
          <option value="">-- Select --</option>
          <option>Fruits & Vegetables</option>
          <option>Grocery</option><option>Medicines</option>
          <option>Packaged Foods</option><option>Dairy</option>
          <option>Water Bottles</option><option>Fashion</option>
          <option>Street Food</option><option>Food</option><option>Household</option>
        </select>
      </div>
    </div>
    <div class="fr">
      <div class="f"><label>Price (₹) *</label><input type="number" id="pPrice" placeholder="0"/></div>
      <div class="f"><label>MRP (₹)</label><input type="number" id="pMrp" placeholder="0"/></div>
    </div>
    <div class="fr">
      <div class="f"><label>Weight/Size</label><input type="text" id="pWeight" placeholder="500g, 1L"/></div>
      <div class="f"><label>Stock</label><input type="number" id="pStock" placeholder="0"/></div>
    </div>
    <div class="fr">
      <div class="f"><label>Delivery Time</label>
        <select id="pDel">
          <option value="30 min">⚡ 30 Minutes</option>
          <option value="1 hour">🕐 1 Hour</option>
          <option value="3 days">📦 3 Days</option>
          <option value="7 days">🚚 7 Days</option>
        </select>
      </div>
      <div class="f"><label>Emoji</label><input type="text" id="pEmoji" placeholder="🍅"/></div>
    </div>
    <div class="f"><label>Description</label><textarea id="pDesc"></textarea></div>
    
    <!-- IMAGE URL -->
    <div class="f">
      <label>Image URL 1</label>
      <input type="url" id="pImg1" placeholder="https://..." oninput="showImgPreview()"/>
    </div>
    <div class="f">
      <label>Image URL 2</label>
      <input type="url" id="pImg2" placeholder="https://..." oninput="showImgPreview()"/>
    </div>
    <div class="f">
      <label>Image URL 3</label>
      <input type="url" id="pImg3" placeholder="https://..." oninput="showImgPreview()"/>
    </div>
    <div class="ipv" id="imgPrev"></div>
    
    <div class="f" style="margin-top:10px">
      <div class="tw">
        <label class="tg"><input type="checkbox" id="pActive" checked/><span class="ts"></span></label>
        Active on website
      </div>
    </div>
    <div class="mf">
      <button class="btn btn-sm btn-grey" onclick="closeModal('pModal')">Cancel</button>
      <button class="btn btn-sm btn-main" id="saveProdBtn">💾 Save Product</button>
    </div>
  </div>
</div>

<!-- ORDER MODAL -->
<div class="ov" id="oModal">
  <div class="md" style="max-width:340px">
    <h2>Update Order</h2>
    <input type="hidden" id="oId"/>
    <div class="f"><label>Order ID</label><input type="text" id="oDisplay" readonly style="background:#f4f4f4"/></div>
    <div class="f"><label>Status</label>
      <select id="oStatus">
        <option value="placed">Placed</option>
        <option value="confirmed">Confirmed</option>
        <option value="preparing">Preparing</option>
        <option value="out_for_delivery">Out for Delivery</option>
        <option value="delivered">Delivered</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>
    <div class="f"><label>Delivery Boy</label><select id="oDb"><option value="">Unassigned</option></select></div>
    <div class="mf">
      <button class="btn btn-sm btn-grey" onclick="closeModal('oModal')">Cancel</button>
      <button class="btn btn-sm btn-main" id="updateOrderBtn">Update</button>
    </div>
  </div>
</div>

<!-- DB MODAL -->
<div class="ov" id="dbModal">
  <div class="md" style="max-width:360px">
    <h2 id="dbModalTitle">Add Partner</h2>
    <input type="hidden" id="dbId"/>
    <div class="f"><label>Name *</label><input type="text" id="dbName"/></div>
    <div class="f"><label>Mobile *</label><input type="tel" id="dbPhone"/></div>
    <div class="f"><label>Vehicle</label><input type="text" id="dbVehicle"/></div>
    <div class="f"><label>Zone</label><input type="text" id="dbZone"/></div>
    <div class="mf">
      <button class="btn btn-sm btn-grey" onclick="closeModal('dbModal')">Cancel</button>
      <button class="btn btn-sm btn-main" id="saveDbBtn">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script>
// =============================================
// FIREBASE INIT
// =============================================
firebase.initializeApp({
  apiKey:"AIzaSyDzZ3jscw_XTLrGk91te_mWhznzqm_ddQI",
  authDomain:"buyzar-28029.firebaseapp.com",
  projectId:"buyzar-28029",
  storageBucket:"buyzar-28029.firebasestorage.app",
  messagingSenderId:"549185963165",
  appId:"1:549185963165:web:8119774da1fa24e63e8074"
});
var db = firebase.firestore();

// =============================================
// DATA STORE
// =============================================
var DATA = {
  products: [],
  orders: [],
  users: [],
  dboys: []
};

// =============================================
// UTILS
// =============================================
function toast(msg, color) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color || '#111';
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

function openModal(id) {
  document.getElementById(id).classList.add('show');
}

document.querySelectorAll('.ov').forEach(function(el) {
  el.addEventListener('click', function(e) {
    if (e.target === el) el.classList.remove('show');
  });
});

// =============================================
// IMAGE PREVIEW
// =============================================
function showImgPreview() {
  var urls = ['pImg1','pImg2','pImg3'].map(function(id){
    var el=document.getElementById(id); return el?el.value.trim():'';
  }).filter(function(u){ return u.length>0; });
  document.getElementById('imgPrev').innerHTML = urls.map(function(u){
    return '<img src="'+u+'" onerror="this.style.opacity=.2" alt="img"/>';
  }).join('');
}

// =============================================
// SIDEBAR
// =============================================
function toggleSB() {
  document.getElementById('sb').classList.toggle('open');
  document.getElementById('sbov').style.display =
    document.getElementById('sb').classList.contains('open') ? 'block' : 'none';
}
function closeSB() {
  document.getElementById('sb').classList.remove('open');
  document.getElementById('sbov').style.display = 'none';
}

document.querySelectorAll('.sb-a').forEach(function(el) {
  el.addEventListener('click', function() {
    document.querySelectorAll('.sb-a').forEach(function(a){ a.classList.remove('act'); });
    el.classList.add('act');
    var page = el.getAttribute('data-page');
    loadPage(page);
    closeSB();
  });
});

// =============================================
// LOGIN
// =============================================
document.getElementById('loginBtn').addEventListener('click', function() {
  var e = document.getElementById('le').value.trim();
  var p = document.getElementById('lp').value.trim();
  document.getElementById('lerr').style.display = 'none';
  if ((e === '9939141695' || e === 'admin@buyzar.in') && p === 'aloneboyrajnish4756') {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    loadAllData();
  } else {
    document.getElementById('lerr').style.display = 'block';
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});
// =============================================
// LOAD ALL DATA (REALTIME)
// =============================================
function loadAllData() {
  document.getElementById('pg').innerHTML = '<div style="text-align:center;padding:40px;color:#888">⏳ Loading data...</div>';
  
  db.collection('products').onSnapshot(function(snap) {
    DATA.products = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
    refreshCurrentPage();
  });

  db.collection('orders').onSnapshot(function(snap) {
    DATA.orders = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
    refreshCurrentPage();
  });

  db.collection('users').onSnapshot(function(snap) {
    DATA.users = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
    refreshCurrentPage();
  });

  db.collection('deliveryBoys').onSnapshot(function(snap) {
    DATA.dboys = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
    refreshCurrentPage();
  });

  setTimeout(function() { loadPage('dashboard'); }, 500);
}

function refreshCurrentPage() {
  var active = document.querySelector('.sb-a.act');
  if (active) loadPage(active.getAttribute('data-page'));
}

// =============================================
// PAGE ROUTER
// =============================================
var pageTitles = {
  dashboard:'Dashboard', orders:'Orders', products:'Products',
  categories:'Categories', users:'Users', delivery:'Delivery Boys',
  payments:'Payment Settings', dsettings:'Delivery Settings', analytics:'Analytics'
};

function loadPage(page) {
  document.getElementById('ptitle').textContent = pageTitles[page] || page;
  var c = document.getElementById('pg');
  if (page === 'dashboard') renderDashboard(c);
  else if (page === 'orders') renderOrders(c);
  else if (page === 'products') renderProducts(c);
  else if (page === 'categories') renderCategories(c);
  else if (page === 'users') renderUsers(c);
  else if (page === 'delivery') renderDelivery(c);
  else if (page === 'payments') renderPayments(c);
  else if (page === 'dsettings') renderDSettings(c);
  else if (page === 'analytics') renderAnalytics(c);
}

// =============================================
// DASHBOARD
// =============================================
function renderDashboard(c) {
  var rev = 0;
  DATA.orders.forEach(function(o){ if(o.status==='delivered') rev += (o.total||0); });
  var rows = DATA.orders.slice(0,5).map(function(o){
    return '<tr><td>#'+o.id.slice(-6).toUpperCase()+'</td><td>'+(o.items||[]).map(function(i){return i.name||'';}).join(', ')+'</td><td>₹'+(o.total||0)+'</td><td><span class="bx bx-or">'+(o.status||'placed').replace(/_/g,' ')+'</span></td><td><button class="btn btn-sm btn-blue" onclick="openOrderModal(\''+o.id+'\')">Update</button></td></tr>';
  }).join('') || '<tr><td colspan="5" style="text-align:center;padding:16px;color:#888">No orders yet</td></tr>';
  
  c.innerHTML = '<div class="sg">'
    +'<div class="sc"><div class="si" style="background:#FFF0EB">📦</div><div><div class="sn">'+DATA.orders.length+'</div><div class="sl">Orders</div></div></div>'
    +'<div class="sc"><div class="si" style="background:#DCFCE7">💰</div><div><div class="sn">₹'+rev.toLocaleString()+'</div><div class="sl">Revenue</div></div></div>'
    +'<div class="sc"><div class="si" style="background:#DBEAFE">🏪</div><div><div class="sn">'+DATA.products.length+'</div><div class="sl">Products</div></div></div>'
    +'<div class="sc"><div class="si" style="background:#F3E8FF">👥</div><div><div class="sn">'+DATA.users.length+'</div><div class="sl">Users</div></div></div>'
    +'</div>'
    +'<div class="card"><div class="ch"><div class="ct">Recent Orders</div><button class="btn btn-sm btn-grey" onclick="loadPage(\'orders\')">View All</button></div>'
    +'<table><thead><tr><th>ID</th><th>Items</th><th>Total</th><th>Status</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

// =============================================
// ORDERS
// =============================================
function renderOrders(c) {
  var rows = DATA.orders.map(function(o){
    return '<tr><td>#'+o.id.slice(-6).toUpperCase()+'</td><td>'+(o.items||[]).map(function(i){return i.name||'';}).join(', ')+'</td><td>₹'+(o.total||0)+'</td><td>'+(o.payment||'COD')+'</td><td><span class="bx bx-or">'+(o.status||'placed').replace(/_/g,' ')+'</span></td><td><button class="btn btn-sm btn-blue" onclick="openOrderModal(\''+o.id+'\')">Update</button></td></tr>';
  }).join('') || '<tr><td colspan="6" style="text-align:center;padding:16px;color:#888">No orders</td></tr>';
  c.innerHTML = '<div class="card"><div class="ch"><div class="ct">All Orders ('+DATA.orders.length+')</div></div><table><thead><tr><th>ID</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function openOrderModal(id) {
  var o = DATA.orders.find(function(x){ return x.id===id; });
  if (!o) return;
  document.getElementById('oId').value = id;
  document.getElementById('oDisplay').value = '#'+id.slice(-6).toUpperCase();
  document.getElementById('oStatus').value = o.status || 'placed';
  document.getElementById('oDb').innerHTML = '<option value="">Unassigned</option>' + DATA.dboys.map(function(d){ return '<option value="'+d.id+'" '+(o.deliveryBoyId===d.id?'selected':'')+'>'+d.name+'</option>'; }).join('');
  openModal('oModal');
}

document.getElementById('updateOrderBtn').addEventListener('click', function() {
  var id = document.getElementById('oId').value;
  var status = document.getElementById('oStatus').value;
  var dbId = document.getElementById('oDb').value;
  db.collection('orders').doc(id).update({status:status, deliveryBoyId:dbId}).then(function() {
    closeModal('oModal');
    toast('✅ Order updated!', '#16A34A');
  }).catch(function(e){ toast('❌ '+e.message, '#DC2626'); });
});

// =============================================
// PRODUCTS
// =============================================
function renderProducts(c) {
  var rows = DATA.products.map(function(p){
    var imgHtml = '';
    if (p.imageUrls && p.imageUrls.length > 0) {
      imgHtml = '<img src="'+p.imageUrls[0]+'" style="width:40px;height:40px;object-fit:cover;border-radius:6px;"/>';
    }
    return '<tr>'
      +'<td>'+imgHtml+' <strong>'+p.name+'</strong><div style="font-size:10px;color:#888">'+(p.weight||'')+'</div></td>'
      +'<td>'+(p.category||'')+'</td>'
      +'<td>₹'+p.price+'</td>'
      +'<td>₹'+(p.mrp||p.price)+'</td>'
      +'<td>'+(p.deliveryTime||'30 min')+'</td>'
      +'<td><span class="bx '+(p.active!==false?'bx-gr':'bx-re')+'">'+(p.active!==false?'Active':'Off')+'</span></td>'
      +'<td style="display:flex;gap:4px;padding-top:8px">'
        +'<button class="btn btn-sm btn-blue" onclick="openProductModal(\''+p.id+'\')">Edit</button>'
        +'<button class="btn btn-sm btn-red" onclick="deleteProduct(\''+p.id+'\')">Del</button>'
      +'</td></tr>';
  }).join('') || '<tr><td colspan="7" style="text-align:center;padding:16px;color:#888">No products yet. Click + Add Product!</td></tr>';
  
  c.innerHTML = '<div class="card"><div class="ch"><div class="ct">Products ('+DATA.products.length+')</div>'
    +'<button class="btn btn-sm btn-main" onclick="openProductModal()">+ Add Product</button>'
    +'</div><table><thead><tr><th>Name</th><th>Category</th><th>Price</th><th>MRP</th><th>Delivery</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function openProductModal(id) {
  ['pName','pPrice','pMrp','pWeight','pStock','pDesc','pEmoji','pImg1','pImg2','pImg3'].forEach(function(f){
    var el = document.getElementById(f); if(el) el.value='';
  });
  document.getElementById('pId').value = '';
  document.getElementById('pCat').value = '';
  document.getElementById('pDel').value = '30 min';
  document.getElementById('pActive').checked = true;
  document.getElementById('imgPrev').innerHTML = '';

  if (id) {
    var p = DATA.products.find(function(x){ return x.id===id; });
    if (!p) return;
    document.getElementById('pModalTitle').textContent = 'Edit Product';
    document.getElementById('pId').value = id;
    document.getElementById('pName').value = p.name||'';
    document.getElementById('pCat').value = p.category||'';
    document.getElementById('pPrice').value = p.price||'';
    document.getElementById('pMrp').value = p.mrp||'';
    document.getElementById('pWeight').value = p.weight||'';
    document.getElementById('pStock').value = p.stock||0;
    document.getElementById('pDesc').value = p.description||'';
    document.getElementById('pEmoji').value = p.emoji||'';
    document.getElementById('pDel').value = p.deliveryTime||'30 min';
    document.getElementById('pActive').checked = p.active!==false;
    var imgs = p.imageUrls||[];
    if(imgs[0]) document.getElementById('pImg1').value = imgs[0];
    if(imgs[1]) document.getElementById('pImg2').value = imgs[1];
    if(imgs[2]) document.getElementById('pImg3').value = imgs[2];
    showImgPreview();
  } else {
    document.getElementById('pModalTitle').textContent = 'Add Product';
  }
  openModal('pModal');
}

document.getElementById('saveProdBtn').addEventListener('click', function() {
  var name  = document.getElementById('pName').value.trim();
  var cat   = document.getElementById('pCat').value;
  var price = parseFloat(document.getElementById('pPrice').value);
  if (!name)       { toast('❌ Product name likho!','#DC2626'); return; }
  if (!cat)        { toast('❌ Category chunao!','#DC2626'); return; }
  if (!price||price<=0) { toast('❌ Sahi price likho!','#DC2626'); return; }

  var imgs = ['pImg1','pImg2','pImg3'].map(function(id){
    var el=document.getElementById(id); return el?el.value.trim():'';
  }).filter(function(u){ return u.length>0; });

  var data = {
    name: name,
    category: cat,
    price: price,
    mrp: parseFloat(document.getElementById('pMrp').value)||price,
    weight: document.getElementById('pWeight').value.trim(),
    stock: parseInt(document.getElementById('pStock').value)||0,
    description: document.getElementById('pDesc').value.trim(),
    emoji: document.getElementById('pEmoji').value.trim() || '📦',
    deliveryTime: document.getElementById('pDel').value,
    active: document.getElementById('pActive').checked,
    imageUrls: imgs,
    updatedAt: new Date().toISOString()
  };

  var editId = document.getElementById('pId').value;
  var btn = document.getElementById('saveProdBtn');
  btn.textContent = '⏳ Saving...';
  btn.disabled = true;

  var promise;
  if (editId) {
    promise = db.collection('products').doc(editId).update(data);
  } else {
    data.createdAt = new Date().toISOString();
    promise = db.collection('products').add(data);
  }

  promise.then(function() {
    btn.textContent = '💾 Save Product';
    btn.disabled = false;
    closeModal('pModal');
    toast('✅ Product saved! Website pe live.', '#16A34A');
  }).catch(function(e) {
    btn.textContent = '💾 Save Product';
    btn.disabled = false;
    toast('❌ Error: '+e.message, '#DC2626');
    console.error(e);
  });
});

function deleteProduct(id) {
  if (!confirm('Delete karna chahte ho?')) return;
  db.collection('products').doc(id).delete().then(function(){
    toast('✅ Deleted!', '#16A34A');
  }).catch(function(e){ toast('❌ '+e.message,'#DC2626'); });
}

function savePayment() {
  var qrUrl = document.getElementById('qrUrl').value.trim();
  var upiId = document.getElementById('upiId').value.trim() || '9939141695@mbk';
  var data = { upiId: upiId, qrImageUrl: qrUrl };
  db.collection('settings').doc('main').set(data, {merge:true}).then(function(){ 
    toast('✅ QR & Payment settings saved!','#16A34A');
    var preview = document.getElementById('qrPreview');
    if(qrUrl) {
      preview.innerHTML = '<img src="'+qrUrl+'" style="max-width:200px;border-radius:10px;border:2px solid #FF4C1C;padding:4px;" onerror="this.style.display=\'none\'"/>';
    } else {
      preview.innerHTML = '';
    }
  }).catch(function(e){ toast('❌ '+e.message,'#DC2626'); });
}

// =============================================
// ANALYTICS
// =============================================
function renderAnalytics(c) {
  var del=0, pen=0, rev=0;
  DATA.orders.forEach(function(o){
    if(o.status==='delivered'){del++;rev+=(o.total||0);}
    else if(['placed','confirmed','preparing'].includes(o.status)) pen++;
  });
  var cc={};
  DATA.products.forEach(function(p){ if(p.category) cc[p.category]=(cc[p.category]||0)+1; });
  var bars = Object.entries(cc).map(function(e){
    var pct=Math.round(e[1]/Math.max(DATA.products.length,1)*100);
    return '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;font-weight:600;margin-bottom:2px"><span>'+e[0]+'</span><span>'+e[1]+'</span></div><div style="background:#eee;border-radius:4px;height:7px"><div style="background:#FF4C1C;width:'+pct+'%;height:7px;border-radius:4px"></div></div></div>';
  }).join('') || '<p style="color:#888;font-size:12px">No products yet</p>';
  
  c.innerHTML = '<div class="sg">'
    +'<div class="sc"><div class="si" style="background:#DCFCE7">✅</div><div><div class="sn">'+del+'</div><div class="sl">Delivered</div></div></div>'
    +'<div class="sc"><div class="si" style="background:#FFF0EB">⏳</div><div><div class="sn">'+pen+'</div><div class="sl">Pending</div></div></div>'
    +'<div class="sc"><div class="si" style="background:#DBEAFE">💰</div><div><div class="sn">₹'+rev.toLocaleString()+'</div><div class="sl">Revenue</div></div></div>'
      +'<div class="sc"><div class="si" style="background:#F3E8FF">🏪</div><div><div class="sn">'+DATA.products.length+'</div><div class="sl">Products</div></div></div>'
    +'</div><div class="card"><div class="ct" style="margin-bottom:12px">By Category</div>'+bars+'</div>';
}
